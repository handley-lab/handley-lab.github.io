# AI Cookbook recipes.
#
# Each entry is a card on /cookbook/. If a matching _recipes/<id>.md
# exists, the card adds a "Read full recipe" link to /cookbook/<id>/.
#
# Required: id, title, category, timebox, status, summary, outcome, evidence
# Optional: proposer, demo_url, repo_url
#
# `status` is one of: Stub, Draft, In progress, Complete.
# `outcome` and `evidence` must be non-empty (`Stub: ...` is acceptable
# for public stubs).

- id: jaxwavelets
  title: "Reproducing PyWavelets in JAX to machine precision"
  category: "Rapid Development"
  timebox: "4.7 hours active computation"
  status: "Complete"
  summary: "JAX-native wavelet transform library reproducing PyWavelets to atol=1e-14 across 1,177 tests, built in a single AI-assisted Claude Code session under adversarial external review (65 reviews, 60% rejected before merge)."
  outcome: "Production-quality library with PyPI release, 1,177 parametrised tests, 100% coverage, and floating-point parity with the C reference implementation."
  evidence: "Complete session JSONL (4,221 entries, 95 prompts); 65 external LLM reviews (60% rejection rate); test suite verifying numerical parity to atol=1e-14; published at github.com/handley-lab/jaxwavelets."
  demo_url:
  repo_url: "https://github.com/handley-lab/jaxwavelets"

- id: camb-torsion
  title: "Navigating CAMB's BBN Pipeline for Modified $N_{\\rm eff}$"
  category: "Legacy Code Navigation"
  timebox: "one session"
  status: "Complete"
  summary: "The TorC parameter $\\varpi_r$ changes the early Universe expansion rate, similar
    to modifying the effective number of neutrinos, and therefore affects the predicted helium
    abundance. Passing this change directly into CAMB accidentally double-counted the effect of
    $\\varpi_r$, since it was already included in the expansion history. Claude traced the issue
    through the legacy code and proposed a cleaner helium calculation that avoids this double
    counting."
  evidence: "Legacy code tracing combined with reference-output validation."
  demo_url:
  repo_url:
  image_before: /assets/images/recipes/recipe_before.png
  image_before_caption: "Modified $N_{\\rm eff}$ (inconsistent)"
  image_after: /assets/images/recipes/recipe_after.png
  image_after_caption: "Modified $Y_{\\rm He}$ (corrected)"

