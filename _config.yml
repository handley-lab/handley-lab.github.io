title: The Handley Research Group
email: wh260@cam.ac.uk
description: >- # this means to ignore newlines until "baseurl:"
  Let AI build the tools. You do the science.
domain: "handley-lab.co.uk"
url: "https://handley-lab.co.uk" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  handley-lab
header_pages:
  - method.md
  - science.md
  - cookbook.md
  - skills.md
  - group.md
  - papers.md
minima:
  skin: classic

# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# AI Cookbook recipes. Cards come from _data/recipes.yml; the collection
# in _recipes/ provides optional long-form companion pages rendered at
# /cookbook/<id>/.
collections:
  recipes:
    output: true
    permalink: /cookbook/:path/

defaults:
  - scope:
      path: ""
      type: recipes
    values:
      layout: recipe

# Exclude files from Jekyll build
exclude:
  - CLAUDE.md
  - script/
  - venv/
  - vendor/
  - requirements.txt
  - .git/
  - .gitignore
  - README.md
  - skills/                         # in-repo Claude skills, not for publishing
  - context/                        # workshop-day orchestrator scratch
