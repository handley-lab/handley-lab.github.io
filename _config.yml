title: The Handley Research Group
email: wh260@cam.ac.uk
description: >- # this means to ignore newlines until "baseurl:"
  Let AI build the tools. You do the science.
domain: "handley-lab.co.uk"
url: "https://handley-lab.co.uk" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  handley-lab
header_pages:
  - method.md
  - science.md
  - case-studies.md
  - skills.md
  - group.md
  - blog.md
minima:
  skin: classic

# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files from Jekyll build
exclude:
  - CLAUDE.md
  - script/
  - venv/
  - requirements.txt
  - .git/
  - .gitignore
  - README.md
